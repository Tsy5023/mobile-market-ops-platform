我<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>任务分类 - 移动市场运营平台</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <link rel="stylesheet" href="../assets/css/common.css"/>
  <link rel="stylesheet" href="../assets/css/metric-pages.css"/>
  <link rel="stylesheet" href="../assets/css/task-category.css"/>
  <script src="../assets/js/nav-data.js"></script>
  <script src="../assets/js/metric-dispatch-store.js"></script>
  <script src="../assets/js/dispatch-metric-work.js"></script>
  <script>const CURRENT_PAGE='task-category.html';</script>
</head>
<body class="page-task-category">
<div class="app-shell">
  <header class="top-nav">
    <div class="brand"><span>移动市场运营平台</span></div>
    <nav class="nav-l1" id="nav-l1"></nav>
    <div class="top-actions">
      <span>张明 · 业务主管</span>
      <div class="avatar"></div>
    </div>
  </header>
  <div class="main-row">
    <aside class="sidebar">
      <div class="sidebar-title" id="sidebar-module-title">模块</div>
      <ul class="menu-l2" id="sidebar-menu"></ul>
    </aside>
    <div class="content-wrap">
      <main class="content-area">
        <div class="breadcrumb">
          <a href="../index.html">首页</a> / 能力中心 / 调度中心 / 任务分类
          · <a href="dispatch-assign.html?tab=metric">调度派发</a>
        </div>

        <div id="task-category-list-view" class="module-view active">
          <div class="page-header">
            <h1>任务分类</h1>
            <p>业务主管视角：一次指标调度产生<strong>一个调度任务（父任务）</strong>，拆分为多个<strong>子任务</strong>派发给执行人；本页仅查看整体与子任务处理进度。</p>
          </div>

          <div class="task-category-stats">
            <div class="task-category-stat"><span class="k">调度任务</span><span class="v" id="stat-metric-total">0</span></div>
            <div class="task-category-stat"><span class="k">跨部门</span><span class="v" id="stat-metric-dept">0</span></div>
            <div class="task-category-stat"><span class="k">跨地市</span><span class="v" id="stat-metric-city">0</span></div>
            <div class="task-category-stat"><span class="k">子任务合计</span><span class="v" id="stat-sub-total">0</span></div>
          </div>

          <div class="page-filter-form">
            <div class="filter-field">
              <label for="task-category-kw">任务/指标</label>
              <input type="text" id="task-category-kw" class="wide" placeholder="任务 ID / 指标名称"/>
            </div>
            <div class="filter-field">
              <label for="task-mode-filter">调度方式</label>
              <select id="task-mode-filter">
                <option value="">全部调度方式</option>
                <option value="跨部门调度">跨部门调度</option>
                <option value="跨地市调度">跨地市调度</option>
              </select>
            </div>
            <div class="filter-actions">
              <button type="button" class="btn btn-primary" id="btn-task-category-filter"><i class="fas fa-search"></i> 查询</button>
              <button type="button" class="btn btn-outline" id="btn-reset-task-demo">恢复演示数据</button>
            </div>
          </div>

          <div class="card">
            <div class="card-header">
              <span><i class="fas fa-layer-group"></i> 调度任务列表（父任务）</span>
              <span class="muted" id="task-category-count" style="font-size:12px;font-weight:normal"></span>
            </div>
            <div class="card-body table-scroll" style="padding:0">
              <table class="data-table task-category-table">
                <thead>
                  <tr>
                    <th>调度任务编号</th>
                    <th>调度方式</th>
                    <th>关联指标</th>
                    <th>子任务完成</th>
                    <th>任务状态</th>
                    <th>派发时间</th>
                    <th style="min-width:220px">操作</th>
                  </tr>
                </thead>
                <tbody id="task-category-tbody"></tbody>
              </table>
              <div class="table-pagination" id="task-category-pagination"></div>
            </div>
          </div>
        </div>

        <div id="task-category-detail-view" class="module-view">
          <div class="page-header" style="margin-bottom:12px">
            <button type="button" class="btn btn-ghost btn-sm" id="btn-task-category-back"><i class="fas fa-arrow-left"></i> 返回列表</button>
            <h1 style="margin-top:10px" id="task-category-detail-title">调度任务详情</h1>
          </div>
          <div id="task-category-detail-body"></div>
        </div>
      </main>
    </div>
  </div>
</div>
<script src="../assets/js/layout.js"></script>
<script src="../assets/js/table-pagination.js"></script>
<script src="../assets/js/task-category.js"></script>
</body>
</html>
