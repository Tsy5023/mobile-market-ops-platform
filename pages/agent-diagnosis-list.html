<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI策略诊断列表 - 移动市场运营平台</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <link rel="stylesheet" href="../assets/css/common.css"/>
  <link rel="stylesheet" href="../assets/css/agent-pages.css"/>
  <link rel="stylesheet" href="../assets/css/agent-strategy-diagnosis.css"/>
  <script src="../assets/js/nav-data.js"></script>
  <script src="../assets/js/table-pagination.js"></script>
  <script src="../assets/js/strategy-lifecycle.js"></script>
  <script src="../assets/js/agent-strategy-diagnosis-data.js"></script>
  <script>const CURRENT_PAGE='agent-diagnosis-list.html';</script>
</head>
<body>
<div class="app-shell">
  <header class="top-nav">
    <div class="brand"><span>移动市场运营平台</span></div>
    <nav class="nav-l1" id="nav-l1"></nav>
    <div class="top-actions"><span>张明 · 省公司运营</span><div class="avatar"></div></div>
  </header>
  <div class="main-row">
    <aside class="sidebar">
      <div class="sidebar-title" id="sidebar-module-title">模块</div>
      <ul class="menu-l2" id="sidebar-menu"></ul>
    </aside>
    <div class="content-wrap">
      <main class="content-area">
        <div class="breadcrumb"><a href="../index.html">首页</a> / 基础功能 / 智能体管理 / AI策略诊断列表</div>
        <div class="page-header" style="display:flex;justify-content:space-between;align-items:center;gap:12px">
          <h1>AI策略诊断列表</h1>
          <a href="agent-activity-list.html" class="btn btn-outline btn-sm"><i class="fas fa-arrow-left"></i> 返回活动列表</a>
        </div>
        <div class="page-filter-form">
          <div class="filter-field">
            <label for="dl-kw">策略ID / 名称</label>
            <input type="text" id="dl-kw" class="wide" placeholder="关键词"/>
          </div>
          <div class="filter-actions">
            <button type="button" class="btn btn-primary" id="btn-dl-search"><i class="fas fa-search"></i> 查询</button>
          </div>
        </div>
        <div class="card">
          <div class="card-header">
            <span>诊断记录</span>
            <span class="muted" id="dl-count" style="font-size:12px;font-weight:normal"></span>
          </div>
          <div class="card-body table-scroll" style="padding:0">
            <table class="data-table agent-data-table agent-sd-table">
              <thead>
                <tr>
                  <th>诊断ID</th>
                  <th>策略ID</th>
                  <th>策略名称</th>
                  <th>策略创建人</th>
                  <th>诊断时间</th>
                  <th>状态</th>
                  <th style="width:140px">操作</th>
                </tr>
              </thead>
              <tbody id="dl-tbody"></tbody>
            </table>
            <div class="table-pagination" id="dl-pagination"></div>
          </div>
        </div>
      </main>
    </div>
  </div>
</div>
<script src="../assets/js/layout.js"></script>
<script src="../assets/js/metric-common.js"></script>
<script src="../assets/js/agent-diagnosis-list.js"></script>
</body>
</html>
