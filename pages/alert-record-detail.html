<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>预警记录详情 - 移动市场运营平台</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <link rel="stylesheet" href="../assets/css/common.css"/>
  <link rel="stylesheet" href="../assets/css/alert-pages.css"/>
  <script src="../assets/js/nav-data.js"></script>
  <script>const CURRENT_PAGE='alert-record-detail.html';</script>
</head>
<body>
<div class="app-shell">
  <header class="top-nav">
    <div class="brand"><span>移动市场运营平台</span></div>
    <nav class="nav-l1" id="nav-l1"></nav>
    <div class="top-actions">
      <span>张明 · 省公司运营</span>
      <div class="avatar"></div>
    </div>
  </header>
  <div class="main-row">
    <aside class="sidebar">
      <div class="sidebar-title" id="sidebar-module-title">模块</div>
      <ul class="menu-l2" id="sidebar-menu"></ul>
    </aside>
    <div class="content-wrap">
      <main class="content-area">
        <div class="breadcrumb">
          <a href="../index.html">首页</a> / 基础功能 / 监控预警管理 /
          <a href="indicator-alert.html">预警记录管理（730）</a> / 预警记录详情
        </div>
        <div class="page-header alert-record-detail-header">
          <div>
            <h1 id="ard-page-title">预警记录详情</h1>
            <p class="alert-record-detail-sub" id="ard-page-sub"></p>
          </div>
          <a href="indicator-alert.html" class="btn btn-outline btn-sm"><i class="fas fa-arrow-left"></i> 返回列表</a>
        </div>

        <div class="alert-record-summary" id="ard-summary"></div>

        <div class="card" id="ard-notify-card">
          <div class="card-header">
            <span>预警通知推送</span>
            <span class="muted" id="ard-notify-count" style="font-size:12px;font-weight:normal"></span>
          </div>
          <div class="card-body">
            <div class="alert-record-notify-summary" id="ard-notify-summary"></div>
            <div class="table-scroll" style="padding:0;margin-top:12px">
              <table class="data-table alert-record-notify-table">
                <thead>
                  <tr>
                    <th>接收人</th>
                    <th>所属组织</th>
                    <th>推送渠道</th>
                    <th>推送状态</th>
                    <th>推送时间</th>
                  </tr>
                </thead>
                <tbody id="ard-notify-tbody"></tbody>
              </table>
            </div>
          </div>
        </div>

        <div class="card" id="ard-results-card">
          <div class="card-header">
            <span>指标监控结果</span>
            <span class="muted" id="ard-item-count" style="font-size:12px;font-weight:normal"></span>
          </div>
          <div class="card-body table-scroll" style="padding:0">
            <table class="data-table alert-record-detail-table">
              <thead>
                <tr>
                  <th>预警指标</th>
                  <th>指标层级</th>
                  <th>监控范围</th>
                  <th>计算规则</th>
                  <th>实际值</th>
                  <th>结果</th>
                  <th>预警内容</th>
                </tr>
              </thead>
              <tbody id="ard-detail-tbody"></tbody>
            </table>
          </div>
        </div>

        <div id="ard-not-found" class="card" hidden>
          <div class="card-body" style="padding:40px;text-align:center">
            <p class="muted">未找到该预警记录，可能已被删除或链接无效。</p>
            <a href="indicator-alert.html" class="btn btn-outline" style="margin-top:12px"><i class="fas fa-arrow-left"></i> 返回列表</a>
          </div>
        </div>
      </main>
    </div>
  </div>
</div>

<script src="../assets/js/layout.js"></script>
<script src="../assets/js/alert-rules-store.js"></script>
<script src="../assets/js/alert-record-common.js"></script>
<script src="../assets/js/indicator-alert-store.js"></script>
<script src="../assets/js/alert-record-detail-page.js"></script>
</body>
</html>
