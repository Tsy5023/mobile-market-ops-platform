<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>策略审批 - 移动市场运营平台</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <link rel="stylesheet" href="../assets/css/common.css"/>
  <link rel="stylesheet" href="../assets/css/metric-pages.css"/>
  <link rel="stylesheet" href="../assets/css/strategy-pages.css"/>
  <link rel="stylesheet" href="../assets/css/strategy-category.css"/>
  <script src="../assets/js/nav-data.js"></script>
  <script src="../assets/js/strategy-approval-data.js"></script>
  <script>const CURRENT_PAGE='strategy-approval.html';</script>
</head>
<body>
<div class="app-shell">
  <header class="top-nav">
    <div class="brand"><span>移动市场运营平台</span><small class="brand-sub">江西公司</small></div>
    <nav class="nav-l1" id="nav-l1"></nav>
    <div class="top-actions">
      <span>张明 · 省公司运营</span>
      <div class="avatar"></div>
    </div>
  </header>
  <div class="main-row">
    <aside class="sidebar">
      <div class="sidebar-title" id="sidebar-module-title">模块</div>
      <ul class="menu-l2" id="sidebar-menu"></ul>
    </aside>
    <div class="content-wrap">
      <main class="content-area">
        <div class="breadcrumb"><a href="../index.html">首页</a> / 能力中心 / 策略中心 / 策略审批</div>
        <div class="page-header strategy-page-header">
          <div><h1>策略审批</h1></div>
        </div>

        <nav class="sc-type-tabs" aria-label="审批状态">
          <button type="button" class="active" data-appr-tab="pending"><i class="fas fa-clock"></i> 待审批策略</button>
          <button type="button" data-appr-tab="approved"><i class="fas fa-check-circle"></i> 已审批策略</button>
        </nav>

        <div class="page-filter-form sc-segment-filter-form" id="appr-filter">
          <div class="sc-filter-row">
            <div class="filter-field">
              <label for="appr-f-submitter">提交人</label>
              <input type="text" id="appr-f-submitter" class="filter-input-sm" placeholder="请输入"/>
            </div>
            <div class="filter-field filter-field-date">
              <label>提交时间</label>
              <div class="sc-date-range">
                <input type="date" id="appr-f-submit-start" title="开始日期"/>
                <span class="date-range-sep">至</span>
                <input type="date" id="appr-f-submit-end" title="结束日期"/>
              </div>
            </div>
            <div class="filter-field appr-filter-approved-only" hidden>
              <label for="appr-f-approver">审批人</label>
              <input type="text" id="appr-f-approver" class="filter-input-sm" placeholder="请输入"/>
            </div>
            <div class="filter-field filter-field-date appr-filter-approved-only" hidden>
              <label>审批时间</label>
              <div class="sc-date-range">
                <input type="date" id="appr-f-approve-start" title="开始日期"/>
                <span class="date-range-sep">至</span>
                <input type="date" id="appr-f-approve-end" title="结束日期"/>
              </div>
            </div>
            <div class="sc-filter-actions" style="margin:0;padding:0;border:none">
              <button type="button" class="btn btn-outline" id="btn-appr-reset"><i class="fas fa-redo"></i> 重置</button>
              <button type="button" class="btn btn-primary" id="btn-appr-query"><i class="fas fa-search"></i> 查询</button>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card-body" style="padding:0">
            <div class="table-scroll">
              <table class="data-table sc-strategy-table">
                <thead id="approval-thead"></thead>
                <tbody id="approval-tbody"></tbody>
              </table>
            </div>
            <div class="table-pagination" id="approval-pagination"></div>
          </div>
        </div>
      </main>
    </div>
  </div>
</div>

<!-- 审批弹窗 -->
<div class="modal-overlay" id="modal-strategy-approval">
  <div class="modal-box" style="width:min(92vw,520px)">
    <div class="modal-head">
      <strong id="approval-modal-title">审批</strong>
      <button type="button" class="modal-close" data-close-modal="modal-strategy-approval"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body">
      <div class="form-field full">
        <label class="req">审批结果</label>
        <div class="radio-inline">
          <label><input type="radio" name="appr-result" value="pass" checked/> 通过</label>
          <label><input type="radio" name="appr-result" value="reject"/> 驳回</label>
        </div>
      </div>
      <div class="form-field full">
        <label id="appr-opinion-label">审批意见</label>
        <textarea id="appr-opinion" rows="4" maxlength="500" placeholder="选填，驳回时必填"></textarea>
        <p class="field-hint muted">审批通过后，策略将进入待执行状态；驳回需填写理由</p>
      </div>
    </div>
    <div class="modal-foot">
      <button type="button" class="btn btn-outline" data-close-modal="modal-strategy-approval">取消</button>
      <button type="button" class="btn btn-primary" id="btn-appr-submit">提交</button>
    </div>
  </div>
</div>

<!-- 策略详情 -->
<div class="modal-overlay" id="modal-strategy-detail">
  <div class="modal-box" style="width:min(92vw,800px);max-height:90vh;display:flex;flex-direction:column">
    <div class="modal-head">
      <strong id="strategy-detail-title">策略详情</strong>
      <button type="button" class="modal-close" data-close-modal="modal-strategy-detail"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body" id="strategy-detail-body" style="overflow-y:auto"></div>
    <div class="modal-foot">
      <button type="button" class="btn btn-outline" data-close-modal="modal-strategy-detail">关闭</button>
    </div>
  </div>
</div>

<script src="../assets/js/layout.js"></script>
<script src="../assets/js/metric-common.js"></script>
<script src="../assets/js/strategy-lifecycle.js"></script>
<script src="../assets/js/strategy-detail-view.js"></script>
<script src="../assets/js/table-pagination.js"></script>
<script src="../assets/js/strategy-approval.js"></script>
</body>
</html>
