<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>历史会话管理 - 移动市场运营平台</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <link rel="stylesheet" href="../assets/css/common.css"/>
  <link rel="stylesheet" href="../assets/css/agent-pages.css"/>
  <link rel="stylesheet" href="../assets/css/agent-chat-widget.css"/>
  <script src="../assets/js/nav-data.js"></script>
  <script src="../assets/js/table-pagination.js"></script>
  <script src="../assets/js/agent-assistant-data.js"></script>
  <script>const CURRENT_PAGE='agent-chat-history.html';</script>
</head>
<body>
<div class="app-shell">
  <header class="top-nav">
    <div class="brand"><span>移动市场运营平台</span></div>
    <nav class="nav-l1" id="nav-l1"></nav>
    <div class="top-actions">
      <span>张明 · 省公司运营</span>
      <div class="avatar"></div>
    </div>
  </header>
  <div class="main-row">
    <aside class="sidebar">
      <div class="sidebar-title" id="sidebar-module-title">模块</div>
      <ul class="menu-l2" id="sidebar-menu"></ul>
    </aside>
    <div class="content-wrap">
      <main class="content-area">
        <div class="breadcrumb"><a href="../index.html">首页</a> / 基础功能 / 智能体管理 / 历史会话管理</div>

        <div class="agent-intro-banner">
          <i class="fas fa-robot"></i>
          <div>
            <strong>知识查询助手 · 历史会话</strong><br/>
            后台知识库支撑用户在前端与机器人交互，可查询文档知识或系统数据。本页用于管理员查看各用户会话记录，并开展问题分析。
          </div>
        </div>

        <div class="page-header" style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px">
          <div>
            <h1>历史会话管理</h1>
          </div>
          <div style="display:flex;gap:8px;flex-wrap:wrap">
            <button type="button" class="btn btn-outline" id="btn-export-session-qa"><i class="fas fa-file-export"></i> 会话问题导出</button>
            <button type="button" class="btn btn-primary" id="btn-qa-analysis"><i class="fas fa-chart-line"></i> 知识助手问题分析</button>
          </div>
        </div>

        <div class="page-filter-form">
          <div class="filter-field">
            <label for="chat-filter-kw">会话/用户</label>
            <input type="text" id="chat-filter-kw" class="wide" placeholder="会话ID / 用户ID / 用户姓名"/>
          </div>
          <div class="filter-field">
            <label for="chat-filter-start">对话开始</label>
            <input type="date" id="chat-filter-start" value="2026-05-01"/>
          </div>
          <div class="filter-field">
            <label for="chat-filter-end">对话结束</label>
            <input type="date" id="chat-filter-end" value="2026-05-31"/>
          </div>
          <div class="filter-actions">
            <button type="button" class="btn btn-primary" id="btn-chat-search"><i class="fas fa-search"></i> 查询</button>
            <button type="button" class="btn btn-outline" id="btn-chat-reset"><i class="fas fa-redo"></i> 重置</button>
          </div>
        </div>

        <div class="card">
          <div class="card-header">
            <span>会话列表</span>
            <span class="muted" id="chat-count" style="font-size:12px;font-weight:normal"></span>
          </div>
          <div class="card-body table-scroll" style="padding:0">
            <table class="data-table agent-data-table">
              <thead>
                <tr>
                  <th>会话ID</th>
                  <th>用户ID</th>
                  <th>用户姓名</th>
                  <th>对话时间</th>
                  <th>最近问题</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="chat-tbody"></tbody>
            </table>
            <div class="table-pagination" id="chat-pagination"></div>
          </div>
        </div>
      </main>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-chat-detail">
  <div class="modal-box modal-agent-lg">
    <div class="modal-header">
      <strong id="chat-detail-title">对话详情</strong>
      <button class="modal-close" data-close-modal="modal-chat-detail"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body">
      <div id="chat-detail-meta"></div>
      <div class="chat-detail-section-title">对话记录</div>
      <div class="chat-detail-wrap" id="chat-detail-messages"></div>
    </div>
    <div class="modal-footer">
      <button type="button" class="btn btn-outline" data-close-modal="modal-chat-detail">关闭</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-qa-analysis">
  <div class="modal-box modal-agent-analysis">
    <div class="modal-header">
      <strong>知识助手问题分析</strong>
      <button class="modal-close" data-close-modal="modal-qa-analysis"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body">
      <div class="page-filter-form" style="margin-bottom:16px;padding:12px;background:#f8fafc;border-radius:8px">
        <div class="filter-field">
          <label for="analysis-start">分析开始时间</label>
          <input type="date" id="analysis-start" value="2026-05-01"/>
        </div>
        <div class="filter-field">
          <label for="analysis-end">分析结束时间</label>
          <input type="date" id="analysis-end" value="2026-05-31"/>
        </div>
        <div class="filter-actions">
          <button type="button" class="btn btn-primary" id="btn-run-analysis"><i class="fas fa-play"></i> 开始分析</button>
        </div>
      </div>
      <div id="analysis-result"></div>
    </div>
    <div class="modal-footer">
      <button type="button" class="btn btn-outline" data-close-modal="modal-qa-analysis">关闭</button>
    </div>
  </div>
</div>

<script src="../assets/js/layout.js"></script>
<script src="../assets/js/metric-common.js"></script>
<script src="../assets/js/agent-chat-widget.js"></script>
<script src="../assets/js/agent-chat-history.js"></script>
</body>
</html>
